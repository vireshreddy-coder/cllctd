.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

<script type="module">

// DATA
const TASKS=[
  {id:'v1',icon:'🎙️',type:'voice',title:'Hindi Phrase Recording',lang:'Hindi',pay:170,dur:'~8 min',count:10,badge:'bonus',hl:'Hindi Phrase',hli:'Recording',desc:'Record yourself speaking 10 common Hindi phrases. Speak naturally — just clearly the way you normally would.',instrs:['Find a quiet spot — background noise causes rejections','Tap the mic and speak each phrase clearly','Hold phone 15–20cm from your mouth','1-second pause between phrases is fine'],

  {id:'t1',icon:'🎙️',type:'voice',title:'Tamil Conversation Set',lang:'Tamil',pay:240,dur:'~12 min',count:1,badge:'hot',hl:'Tamil Conversation',hli:'Set',desc:'Record a 2-minute natural dialogue in Tamil. Regional accent preferred.',instrs:['Read the prompt and understand it first','Speak naturally, not like you\'re reading','Regional accent and idioms are a plus','Quiet room required — no echo'],phrases:[{t:'என் பெயர் என்ன? நான் எங்கே இருக்கிறேன்?',r:'Enna peyar? Naan enge irukiren?'}]},

  {id:'p1',icon:'📷',type:'photo',title:'Street Scene Photos',lang:'Any',pay:70,dur:'~10 min',count:10,badge:null,hl:'Street Scene',hli:'Photos',desc:'Upload 10 photos of outdoor street scenes from your area. Markets, roads, shops, traffic.',instrs:['Take photos outdoors in natural light','Avoid blurry or dark images','No faces visible — blur or avoid','Variety preferred — different streets and angles']},
  {id:'x1',icon:'📝',type:'text',title:'Sentence Sentiment Labels',lang:'Any',pay:45,dur:'~6 min',count:20,badge:null,hl:'Sentence Sentiment',hli:'Labels',desc:'Read 20 sentences and label each as positive, negative, or neutral.',instrs:['Read each sentence fully first','Choose overall tone — don\'t overthink','If ambiguous, choose Neutral','Any language welcome'],
  txItems:[{t:'The food was absolutely wonderful and service was prompt.',o:['Positive','Negative','Neutral']},{t:'My phone battery died during an important call.',o:['Positive','Negative','Neutral']},{t:'The train arrives at 9:45am from Platform 3.',o:['Positive','Negative','Neutral']},{t:'I can\'t believe how kind everyone was at the event.',o:['Positive','Negative','Neutral']},{t:'The package was damaged and nothing was done.',o:['Positive','Negative','Neutral']}]},
  {id:'m1',icon:'🎙️',type:'voice',title:'Marathi Regional Phrases',lang:'Marathi',pay:115,dur:'~7 min',count:8,badge:'bonus',hl:'Marathi Regional',hli:'Phrases',desc:'Record 8 phrases in Marathi. Pune or Nashik dialect is particularly valuable.',instrs:['Speak in your natural Marathi dialect','Don\'t switch to Hindi mid-recording','Clear pronunciation, normal pace','Quiet room required'],

const HIST=[
  {task:'Hindi Phrase Recording ×10',date:'Today · 2:14pm',amt:'+₹170',type:'cr',st:'pending'},
  {task:'Workplace POV Video',date:'Today · 11:02am',amt:'+₹180',type:'cr',st:'approved'},

const use=(sel)=>{

// NAV
const go=(s,keep)=>set({prev:keep?S.prev:S.scr,scr:s});

const startTask=()=>{
  const t=S.task;if(!t)return;
  if(t.type==='voice')set({scr:'voice'});

  else if(t.type==='photo')set({scr:'photo'});

let _tt;
const toast=(m)=>{clearTimeout(_tt);set({tm:m,tv:true});_tt=setTimeout(()=>set({tv:false}),2500)};

// COMPONENTS
function Toast(){const m=use(s=>s.tm),v=use(s=>s.tv);return h('div',{className:`toast${v?' show':''}`},m)}

const NavIco={

  earn:h('svg',{viewBox:'0 0 24 24'},h('circle',{cx:'12',cy:'12',r:'9'}),h('path',{d:'M14.8 9A2 2 0 0013 8h-2a2 2 0 000 4h2a2 2 0 010 4h-2a2 2 0 01-1.8-1M12 7v1m0 8v1'})),
  prof:h('svg',{viewBox:'0 0 24 24'},h('path',{d:'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2'}),h('circle',{cx:'12',cy:'7',r:'4'})),
};
function BNav({a}){

// SPLASH

    h('div',{className:'owrap',style:{paddingBottom:'1rem'}},

      h('div',{className:'otagline'},'Your voice.',h('br'),'Your world.',h('br'),h('em',null,'Your income.')),
      h('p',{className:'osub'},'AI companies pay thousands for data only you can provide. cllctd pays you directly — every task, every time.'),

// PHONE
function Phone(){
  const[p,sp]=useState('');
  return h('div',{className:'screen fin',style:{justifyContent:'space-between'}},
    h('div',{className:'fwrap'},
      h('h2',{className:'ftitle'},'Enter your ',h('em',null,'number.')),

}

// OTP
function OTP(){
  const[d,sd]=useState(['','','','','','']);
  const[cd,scd]=useState(45);
  const refs=[useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];
  useEffect(()=>{if(cd<=0)return;const t=setTimeout(()=>scd(c=>c-1),1000);return()=>clearTimeout(t)},[cd]);
  const hit=(i,v)=>{
    const nd=[...d];nd[i]=v.slice(-1);sd(nd);
    if(v&&i<5)refs[i+1].current?.focus();
    if(nd.every(x=>x))setTimeout(()=>go('profileSetup'),300);
  };
  return h('div',{className:'screen fin',style:{justifyContent:'space-between'}},
    h('div',{className:'fwrap'},
      h('h2',{className:'ftitle'},'Enter the ',h('em',null,'code.')),
      h('p',{className:'fsub'},'We sent a 6-digit code to your number.'),
      h('div',{className:'otp-row'},
        d.map((v,i)=>h('input',{key:i,ref:refs[i],className:'obox',type:'tel',inputMode:'numeric',maxLength:1,value:v,
          onChange:e=>hit(i,e.target.value),
          onKeyDown:e=>{if(e.key==='Backspace'&&!v&&i>0)refs[i-1].current?.focus();}}))
      ),
      h('p',{className:'rrow'},cd>0?`Resend in ${cd}s`:h(Fragment,null,'Didn\'t get it? ',h('a',{onClick:()=>{scd(45);toast('New OTP sent')}},'Resend'))),
    ),
    h('div',{style:{padding:'0 1.1rem 1.5rem'}},h('button',{className:'btn bg fw',onClick:()=>go('phone')},'← Back'))
  );
}

  return h('div',{className:'screen fin',style:{justifyContent:'space-between'}},

// VOICE
function VoiceTask(){
  const t=use(s=>s.task);
  const[idx,si]=useState(0);
  const[rec,sr]=useState(false);
  const[done,sd]=useState([]);
  const[skipped,ss]=useState(0);
  const tmr=useRef(null);
  const phrases=t?.phrases||[];
  const start=()=>{sr(true);tmr.current=setTimeout(()=>stop(true),4000)};
  const stop=(auto)=>{
    clearTimeout(tmr.current);sr(false);
    if(!auto)return;
    const nd=[...done,idx];sd(nd);
    setTimeout(()=>{
      if(idx+1>=phrases.length||nd.length+skipped>=phrases.length){set({scr:'success'});}
      else si(i=>i+1);
    },600);
  };
  const skip=()=>{
    if(skipped>=2){toast('Max 2 skips per task');return;}
    ss(s=>s+1);
    if(idx+1>=phrases.length||done.length+skipped+1>=phrases.length){set({scr:'success'});return;}
    si(i=>i+1);
  };
  return h('div',{className:'screen'},
    h('div',{className:'back-row'},h('button',{className:'bbtn',onClick:()=>set({scr:'detail',prev:'home'})},'←'),h('span',{className:'btitle'},t?.lang+' Phrases'),h('span',{style:{fontSize:'.78rem',color:'var(--muted)'}},`${idx+1}/${phrases.length}`)),
    h('div',{className:'rbody'},
      h('div',{className:'pc'},h('div',{className:'pnum'},`Phrase ${idx+1} of ${phrases.length}`),h('div',{className:'ptxt'},phrases[idx]?.t),phrases[idx]?.r&&h('div',{className:'ptrans'},phrases[idx].r)),
      h('div',{className:'dots'},phrases.map((_,i)=>h('div',{key:i,className:`dot${done.includes(i)?' done':i===idx?' now':''}`}))),
      rec?h('div',{className:'wform'},Array.from({length:7},(_,i)=>h('div',{key:i,className:'wb'})))
         :h('div',{className:'ibars'},[8,14,6,18,10,14,8].map((ht,i)=>h('div',{key:i,className:'ib',style:{height:ht+'px'}}))),
      h('button',{className:`rbtn${rec?' rec':''}`,onClick:()=>rec?stop(true):start()},rec?'⏹':'🎙️'),
      h('div',{className:'rhint'},rec?'Recording… tap to stop':done.includes(idx)?'✓ Recorded — tap to re-record':'Tap to start recording'),
    ),
    h('div',{style:{padding:'1rem 1.1rem',borderTop:'1px solid var(--bdr)',flexShrink:0}},
      h('button',{className:'btn bg fw',onClick:skip},'Skip this phrase'),
    )
  );
}

// VIDEO
function VideoTask(){
  const[rec,sr]=useState(false);
  const[secs,ss]=useState(0);
  const tmr=useRef(null);
  const toggle=()=>{
    if(rec){clearInterval(tmr.current);sr(false);if(secs>=5)setTimeout(()=>set({scr:'success'}),400);else toast('Record at least 5 seconds');}
    else{ss(0);sr(true);tmr.current=setInterval(()=>ss(s=>{if(s>=35){clearInterval(tmr.current);sr(false);setTimeout(()=>set({scr:'success'}),400);return 35;}return s+1;}),1000);}
  };
  return h('div',{className:'screen'},
    h('div',{className:'back-row'},h('button',{className:'bbtn',onClick:()=>set({scr:'detail'})},'←'),h('span',{className:'btitle'},'Video Task'),h('span',{style:{fontSize:'.78rem',color:'var(--muted)'}},'25–35 sec')),
    h('div',{className:'vid-area'},
      h('div',{style:{width:'100%',height:'100%',background:'var(--s1)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'.75rem'}},
        h('span',{style:{fontSize:'3rem'}},'📷'),
        h('p',{style:{fontSize:'.8rem',color:'var(--muted)',textAlign:'center',maxWidth:'180px',lineHeight:1.5}},rec?'Recording in progress…':'Camera preview\n(needs HTTPS + permissions in prod)'),
      ),

          rec?`${String(Math.floor(secs/60)).padStart(2,'0')}:${String(secs%60).padStart(2,'0')} ●`:'0:00 / 0:35'

        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'1.5rem',width:'100%'}},

          h('button',{className:`vbtn${rec?' rec':''}`,onClick:toggle},h('div',{className:'vi'})),

  );

// PHOTO
function PhotoTask(){
  const t=use(s=>s.task);
  const[photos,sp]=useState([]);
  const fr=useRef(null);
  const req=t?.count||10;
  const addP=(e)=>{
    Array.from(e.target.files||[]).forEach(f=>{
      const url=URL.createObjectURL(f);
      sp(p=>p.length<req?[...p,url]:p);
    });
  };
  return h('div',{className:'screen'},
    h('div',{className:'back-row'},h('button',{className:'bbtn',onClick:()=>set({scr:'detail'})},'←'),h('span',{className:'btitle'},'Photo Task'),h('span',{style:{fontSize:'.78rem',color:'var(--muted)'}},`${photos.length}/${req}`)),
    h('div',{className:'scroller'},
      h('div',{style:{padding:'.75rem 1.1rem .4rem',fontSize:'.78rem',color:'var(--cream-d)',lineHeight:1.5}},`Upload ${req} outdoor street scene photos. Natural light, no faces.`),
      h('div',{className:'pgrid'},
        Array.from({length:req},(_,i)=>
          photos[i]
            ?h('div',{key:i,className:'pcell'},h('img',{src:photos[i],alt:''}),h('div',{className:'prm',onClick:()=>sp(p=>p.filter((_,j)=>j!==i))},'✕'))
            :h('div',{key:i,className:'pcell'},h('span',null,'📷'),h('p',{className:'pcell-lbl'},`Photo ${i+1}`))
        )
      ),
    ),
    h('div',{className:'pact'},
      h('button',{className:'pab',onClick:()=>fr.current?.click()},h('span',null,'📷'),'Take Photo'),
      h('button',{className:'pab',onClick:()=>fr.current?.click()},h('span',null,'🖼️'),'Upload'),
    ),
    h('input',{ref:fr,type:'file',accept:'image/*',multiple:true,style:{display:'none'},onChange:addP}),
    h('div',{className:'abar'},
      h('button',{className:`btn fw${photos.length>=req?' ba':' bd'}`,onClick:()=>photos.length>=req?set({scr:'success'}):toast(`Add ${req-photos.length} more photos`)},

      )
    )
  );
}
